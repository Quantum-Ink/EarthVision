version: '3.8'

services:
  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/typhoon_platform
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-secret-key}
      - NEXTAUTH_URL=http://localhost:3000
      - MIMO_API_KEY=${MIMO_API_KEY}
      - MIMO_API_URL=${MIMO_API_URL:-https://api.mimo.com/v1}
      - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}
      - REDIS_URL=redis://redis:6379
      - ML_SERVER_URL=http://ml-server:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-server:
        condition: service_started
    restart: unless-stopped
    networks:
      - typhoon-network

  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=typhoon_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - typhoon-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - typhoon-network

  # Python ML 服务器
  ml-server:
    build:
      context: ./src/python/ml-server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/saved_models
      - LOG_LEVEL=INFO
    volumes:
      - ml_models:/app/saved_models
    restart: unless-stopped
    networks:
      - typhoon-network

  # 数据采集调度器
  collector:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "scripts/collector.js"]
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/typhoon_platform
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - typhoon-network

volumes:
  postgres_data:
  redis_data:
  ml_models:

networks:
  typhoon-network:
    driver: bridge
